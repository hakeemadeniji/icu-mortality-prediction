name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build

  backend:
    name: Backend (compile + import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-api.txt
      - name: Install dependencies
        run: pip install -r requirements-api.txt -r requirements-dev.txt
      - name: Byte-compile all modules
        run: python -m compileall -q api core services main.py
      - name: Import smoke test (loads app + routers + services)
        run: python -c "import main; print('backend import OK, routes:', len(main.app.routes))"
      - name: Unit tests + coverage gate (clinical engine)
        run: >-
          python -m pytest tests/ -q
          --cov=services.clinical_scores --cov=services.clinical_trends
          --cov=services.validation_metrics
          --cov=services.synthetic_cohort --cov=services.mimic_adapter
          --cov-report=term-missing --cov-fail-under=90
